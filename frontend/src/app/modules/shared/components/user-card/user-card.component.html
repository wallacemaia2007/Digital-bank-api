<div
  class="min-h-screen flex items-center justify-center transition-colors duration-300 bg-neuro-dark-50 dark:bg-neuro-dark-900">
  <div
    class="rounded-[20px] p-6 w-80 transition-all duration-300 bg-white dark:bg-neuro-dark-800 shadow-[0_8px_32px_rgba(0,0,0,0.10)] dark:shadow-[0_8px_32px_rgba(0,0,0,0.45)]">

    <div class="flex justify-between items-start mb-5">

      <div
        class="w-[52px] h-[52px] rounded-[14px] overflow-hidden flex-shrink-0 bg-neuro-dark-100 dark:bg-neuro-dark-700">
        <img [src]="user.avatarUrl || 'https://api.dicebear.com/7.x/adventurer/svg?seed=' + user.name" [alt]="user.name"
          class="w-full h-full object-cover block" />
      </div>

      <button type="button" (click)="toggleTheme()"
        class="flex items-center gap-0.5 rounded-full border-none px-[7px] py-[5px] transition-colors duration-300"
        [ngClass]="isDarkMode ? 'bg-neuro-dark-700 text-neuro-dark-300 hover:bg-neuro-dark-600' : 'bg-neuro-dark-100 text-neuro-dark-700 hover:bg-neuro-dark-200'"
        [attr.aria-label]="isDarkMode ? 'Ativar modo claro' : 'Ativar modo escuro'"
        [matTooltip]="isDarkMode ? 'Ativar modo claro' : 'Ativar modo escuro'" matTooltipPosition="above">
        <span
          class="flex h-[30px] w-[30px] items-center justify-center rounded-full transition-all duration-300"
          [ngClass]="isDarkMode ? 'bg-white text-neuro-dark-900' : 'bg-transparent text-neuro-dark-500'">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </span>

        <span
          class="flex h-[30px] w-[30px] items-center justify-center rounded-full transition-all duration-300"
          [ngClass]="isDarkMode ? 'bg-transparent text-neuro-dark-600' : 'bg-neuro-dark-900 text-white'">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
        </span>
      </button>
    </div>

    <p
      class="text-[11px] font-semibold tracking-widest mb-1.5 transition-colors duration-300 text-neuro-dark-600 dark:text-neuro-dark-500">
      {{ dateStr }}
    </p>

    <h1
      class="text-[32px] font-bold leading-[1.15] tracking-tight m-0 transition-colors duration-300 text-neuro-dark-900 dark:text-white">
      Welcome back,<br />{{ user.name }}!
    </h1>

  </div>
</div>
