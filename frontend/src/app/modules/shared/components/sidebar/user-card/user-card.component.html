<div
  class="w-full rounded-[16px] border p-4 transition-all duration-300 bg-t-light-light dark:bg-t-dark-lighter border-t-light-dark dark:border-t-dark-light">

  <div class="flex justify-between items-center mb-3">
    <div class="w-11 h-11 rounded-[12px] overflow-hidden flex-shrink-0 bg-t-light-dark dark:bg-t-dark-light">
      <img [src]="user.avatarUrl || 'https://i.pinimg.com/474x/21/9e/ae/219eaea67aafa864db091919ce3f5d82.jpg'"
        [alt]="user.name || 'User'" class="w-full h-full object-cover block" />
    </div>

    <div class="flex items-center gap-1">
      <button type="button" (click)="toggleTheme()"
        class="flex items-center justify-center w-8 h-8 rounded-full border-none transition-colors duration-200"
        [ngClass]="isDarkMode ? 'bg-t-dark-light text-gray-400 hover:bg-t-dark' : 'bg-t-light-dark text-gray-700 hover:bg-gray-300'"
        [attr.aria-label]="isDarkMode ? 'Modo claro' : 'Modo escuro'">
        <svg *ngIf="isDarkMode" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
        <svg *ngIf="!isDarkMode" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
      </button>
    </div>
  </div>

  <p class="text-[10px] font-semibold tracking-widest mb-1 text-gray-600 dark:text-gray-500">{{ dateStr }}</p>

  <h2 class="text-[18px] font-bold leading-[1.2] tracking-tight m-0 text-gray-900 dark:text-white">
    Bem Vindo<br />{{ user.name || 'User' }} !
  </h2>

</div>
